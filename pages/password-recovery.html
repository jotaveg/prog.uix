<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - FREELAS</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header__content">
                <a href="../index.html" class="logo">
                    <h1>FREELAS</h1>
                </a>
                <button class="hamburger" id="hamburger" aria-label="Menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="auth-main">
        <div class="auth-container">
            <div class="auth-card">
                <h2 class="auth-title">Recuperar Senha</h2>
                <p class="auth-subtitle">Digite seu e-mail para recuperar sua senha</p>

                <div class="recovery-form">
                    <div class="form-group">
                        <label for="recovery-email">E-mail</label>
                        <input 
                            type="email" 
                            id="recovery-email" 
                            name="email"
                            placeholder="seu@email.com"
                            required
                        >
                    </div>

                    <a href="../index.html" class="btn btn--primary btn--full btn--large">
                        Enviar Link de Recuperação
                    </a>

                    <div class="recovery-footer">
                        <p>Você receberá um e-mail com um link para redefinir sua senha.</p>
                        <p class="auth-footer">
                            Lembrou sua senha? <a href="login.html">Voltar ao login</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer__bottom">
                <p>&copy; 2026 FREELAS. Todos os direitos reservados.</p>
            </div>
        </div>
    </footer>

    <script src="../script.js"></script>
</body>
</html>
