<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mercado de Serviços</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header__content">
                <a href="../index.html" class="logo">
                    <h1>Mercado de Serviços</h1>
                </a>
                <button class="hamburger" id="hamburger" aria-label="Menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="auth-main">
        <div class="auth-container">
            <div class="auth-card">
                <h2 class="auth-title">Bem-vindo de Volta</h2>
                <p class="auth-subtitle">Faça login em sua conta</p>

                <!-- Toggle between Client and Freelancer -->
                <div class="auth-toggle">
                    <button class="toggle-btn toggle-btn--active" data-type="client">
                        Sou Cliente
                    </button>
                    <button class="toggle-btn" data-type="freelancer">
                        Sou Prestador
                    </button>
                </div>

                <!-- Client Login Form -->
                <div id="clientForm" class="auth-form active">
                    <a href="listings.html" class="btn btn--primary btn--full btn--large">
                        Entrar como Cliente
                    </a>
                </div>

                <!-- Freelancer Login Form -->
                <div id="freelancerForm" class="auth-form">
                    <a href="dashboard.html" class="btn btn--primary btn--full btn--large">
                        Entrar como Prestador
                    </a>
                </div>

                <!-- Divider -->
                <div class="auth-divider">
                    <span>ou</span>
                </div>

                <!-- Social Login -->
                <button class="btn btn--secondary btn--full">
                    Entrar com Google
                </button>

                <!-- Sign Up Link -->
                <p class="auth-footer">
                    Não tem uma conta? <a href="register.html">Registre-se aqui</a>
                </p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer__bottom">
                <p>&copy; 2026 Mercado de Serviços. Todos os direitos reservados.</p>
            </div>
        </div>
    </footer>

    <script src="../script.js"></script>
    <script src="auth.js"></script>
</body>
</html>
