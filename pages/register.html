<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar - Mercado de Serviços</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header__content">
                <a href="../index.html" class="logo">
                    <h1>Mercado de Serviços</h1>
                </a>
                <button class="hamburger" id="hamburger" aria-label="Menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="auth-main">
        <div class="auth-container">
            <div class="auth-card">
                <h2 class="auth-title">Criar Conta</h2>
                <p class="auth-subtitle">Junte-se ao nosso marketplace de serviços</p>

                <!-- Toggle between Client and Freelancer -->
                <div class="auth-toggle">
                    <button class="toggle-btn toggle-btn--active" data-type="client">
                        Sou Cliente
                    </button>
                    <button class="toggle-btn" data-type="freelancer">
                        Sou Prestador
                    </button>
                </div>

                <!-- Client Registration Form -->
                <form id="clientForm" class="auth-form active">
                    <div class="form-group">
                        <label for="client-name">Nome Completo</label>
                        <input 
                            type="text" 
                            id="client-name" 
                            name="name"
                            placeholder="Seu nome completo"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="client-email">Email</label>
                        <input 
                            type="email" 
                            id="client-email" 
                            name="email"
                            placeholder="seu@email.com"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="client-phone">Telefone</label>
                        <input 
                            type="tel" 
                            id="client-phone" 
                            name="phone"
                            placeholder="(11) 98765-4321"
                        >
                    </div>

                    <div class="form-group">
                        <label for="client-password">Senha</label>
                        <input 
                            type="password" 
                            id="client-password" 
                            name="password"
                            placeholder="Mínimo 8 caracteres"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="client-confirm-password">Confirmar Senha</label>
                        <input 
                            type="password" 
                            id="client-confirm-password" 
                            name="confirm_password"
                            placeholder="Confirme sua senha"
                            required
                        >
                    </div>

                    <div class="form-group form-checkbox">
                        <input type="checkbox" id="client-terms" name="terms" required>
                        <label for="client-terms" class="form-terms__label">
                            Concordo com os <a href="#">Termos de Serviço</a> e <a href="#">Política de Privacidade</a>
                        </label>
                    </div>

                    <a href="listings.html" class="btn btn--primary btn--full btn--large">
                        Registrar como Cliente
                    </a>
                </div>

                <!-- Freelancer Registration Form -->
                <form id="freelancerForm" class="auth-form">
                    <div class="form-group">
                        <label for="freelancer-name">Nome Completo</label>
                        <input 
                            type="text" 
                            id="freelancer-name" 
                            name="name"
                            placeholder="Seu nome completo"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="freelancer-email">Email</label>
                        <input 
                            type="email" 
                            id="freelancer-email" 
                            name="email"
                            placeholder="seu@email.com"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="freelancer-phone">Telefone</label>
                        <input 
                            type="tel" 
                            id="freelancer-phone" 
                            name="phone"
                            placeholder="(11) 98765-4321"
                        >
                    </div>

                    <div class="form-group">
                        <label for="freelancer-service">Serviço Principal</label>
                        <select id="freelancer-service" name="service" required>
                            <option value="">Selecione um serviço</option>
                            <option value="plumbing">Encanamento</option>
                            <option value="electrical">Eletricista</option>
                            <option value="painting">Pintura</option>
                            <option value="cleaning">Limpeza</option>
                            <option value="beauty">Beleza</option>
                            <option value="petcare">Pet Care</option>
                            <option value="other">Outro</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="freelancer-password">Senha</label>
                        <input 
                            type="password" 
                            id="freelancer-password" 
                            name="password"
                            placeholder="Mínimo 8 caracteres"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="freelancer-confirm-password">Confirmar Senha</label>
                        <input 
                            type="password" 
                            id="freelancer-confirm-password" 
                            name="confirm_password"
                            placeholder="Confirme sua senha"
                            required
                        >
                    </div>

                    <div class="form-group form-checkbox">
                        <input type="checkbox" id="freelancer-terms" name="terms" required>
                        <label for="freelancer-terms" class="form-terms__label">
                            Concordo com os <a href="#">Termos de Serviço</a> e <a href="#">Política de Privacidade</a>
                        </label>
                    </div>

                    <a href="dashboard.html" class="btn btn--primary btn--full btn--large">
                        Registrar como Prestador
                    </a>
                </div>

                <!-- Sign In Link -->
                <p class="auth-footer">
                    Já tem uma conta? <a href="login.html">Faça login aqui</a>
                </p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer__bottom">
                <p>&copy; 2026 Mercado de Serviços. Todos os direitos reservados.</p>
            </div>
        </div>
    </footer>

    <script src="../script.js"></script>
    <script src="auth.js"></script>
</body>
</html>
